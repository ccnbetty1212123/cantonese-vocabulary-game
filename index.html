<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>廣東話詞彙小遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        #sound-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }

        #sound-prompt.hidden {
            display: none;
        }

        .sound-button {
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .sound-button:active {
            transform: scale(0.95);
        }

        #enable-sound {
            background-color: #4CAF50;
            color: white;
        }

        #enable-sound:hover {
            background-color: #45a049;
        }

        .sound-text {
            color: white;
            font-size: 28px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="sound-prompt">
    <div class="sound-text">🔊 請先啟用聲音</div>
    <button id="enable-sound" class="sound-button">啟用聲音</button>
</div>

<div id="game-container"></div>

<script>
let soundEnabled = false;

// Enable sound on user interaction
document.getElementById('enable-sound').addEventListener('click', function() {
    soundEnabled = true;
    document.getElementById('sound-prompt').classList.add('hidden');
    
    // Resume audio context on iOS
    if (window.game && window.game.sound) {
        window.game.sound.resume();
    }
});

// Alternative: Try to enable sound on any user interaction
document.addEventListener('touchstart', function enableSound() {
    if (!soundEnabled) {
        soundEnabled = true;
        if (window.game && window.game.sound) {
            window.game.sound.resume();
        }
        document.removeEventListener('touchstart', enableSound);
    }
}, false);

const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 800,
        height: 600,
        orientation: 'portrait',
        expandParent: true
    },
    backgroundColor: '#87CEEB',
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update },
    input: {
        touch: {
            target: window
        }
    },
    audio: {
        disableWebAudio: false
    }
};

const game = new Phaser.Game(config);
window.game = game;

let locations = [
    { key: 'school', text: '學校', x: 200, y: 150 },
    { key: 'classroom', text: '課室', x: 600, y: 150 },
    { key: 'toilet', text: '廁所', x: 200, y: 450 },
    { key: 'kitchen', text: '廚房', x: 600, y: 450 }
];

let character, currentTarget, trialCount = 0;
let feedbackText, scoreText;

function preload() {
    // Load Images - Background and location images as JPG
    this.load.image('bg', 'assets/bg.jpg');
    this.load.image('character', 'assets/student.png');
    locations.forEach(loc => {
        this.load.image(loc.key, `assets/${loc.key}.jpg`);
    });

    // Load Audio
    locations.forEach(loc => {
        this.load.audio(loc.key + '_vo', `assets/${loc.key}.mp3`);
    });
    this.load.audio('correct', 'assets/correct.mp3');
    this.load.audio('wrong', 'assets/wrong.mp3');
    this.load.audio('congrats', 'assets/congrats.mp3');
}

function create() {
    // Resume audio context on iOS
    this.sound.resume();

    // 1. Setup Background and Locations
    this.add.image(400, 300, 'bg').setAlpha(0.3);
    
    locations.forEach(loc => {
        let zone = this.add.container(loc.x, loc.y);
        let img = this.add.image(0, 0, loc.key).setDisplaySize(150, 120).setInteractive();
        let txt = this.add.text(0, 70, loc.text, { fontSize: '24px', color: '#000', backgroundColor: '#fff', padding: { x: 10, y: 5 } }).setOrigin(0.5);
        zone.add([img, txt]);
        zone.setSize(150, 120);
        zone.setData('key', loc.key);
        zone.setInteractive();
    });

    // 2. Character Setup
    character = this.add.image(100, 300, 'character').setDisplaySize(80, 120).setInteractive();
    this.input.setDraggable(character);
    character.setData('startX', 100);
    character.setData('startY', 300);

    // 3. UI Elements
    scoreText = this.add.text(20, 20, '進度: 0/10', { fontSize: '20px', fill: '#000', backgroundColor: '#fff', padding: { x: 10, y: 5 } });
    feedbackText = this.add.text(400, 300, '', { fontSize: '48px', fill: '#ff0000', stroke: '#fff', strokeThickness: 4 }).setOrigin(0.5).setVisible(false);

    // 4. Drag Logic - Touch & Mouse Support
    this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
        gameObject.x = dragX;
        gameObject.y = dragY;
    });

    this.input.on('dragend', (pointer, gameObject) => {
        checkDrop(this, gameObject);
    });

    startNewTrial(this);
}

function startNewTrial(scene) {
    if (trialCount >= 10) {
        showCongratulation(scene);
        return;
    }

    // Pick a random location
    currentTarget = Phaser.Utils.Array.GetRandom(locations);
    
    // Play Cantonese Voiceover: 「我要去 [Location]」
    if (soundEnabled) {
        scene.sound.play(currentTarget.key + '_vo');
    }
    
    // Reset Character Position
    character.x = character.getData('startX');
    character.y = character.getData('startY');
}

function checkDrop(scene, char) {
    let matched = false;
    
    // Check if character is over the correct box
    locations.forEach(loc => {
        if (loc.key === currentTarget.key) {
            let dist = Phaser.Math.Distance.Between(char.x, char.y, loc.x, loc.y);
            if (dist < 100) {
                matched = true;
            }
        }
    });

    if (matched) {
        if (soundEnabled) {
            scene.sound.play('correct');
        }
        trialCount++;
        scoreText.setText(`進度: ${trialCount}/10`);
        
        // Brief pause before next trial
        scene.time.delayedCall(1000, () => {
            startNewTrial(scene);
        });
    } else {
        if (soundEnabled) {
            scene.sound.play('wrong');
        }
        // Snap back to start
        scene.tweens.add({
            targets: char,
            x: char.getData('startX'),
            y: char.getData('startY'),
            duration: 500,
            ease: 'Power2'
        });
    }
}

function showCongratulation(scene) {
    if (soundEnabled) {
        scene.sound.play('congrats');
    }
    let overlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.7);
    scene.add.text(400, 300, '你好棒！\n完成練習了！', { 
        fontSize: '56px', 
        fill: '#fff', 
        align: 'center',
        backgroundColor: '#333',
        padding: { x: 20, y: 20 }
    }).setOrigin(0.5);
    
    character.setVisible(false);
}

function update() {}
</script>
</body>
</html>
