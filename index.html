<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>廣東話詞彙小遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
        }
        
        canvas {
            display: block !important;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
// Get actual screen dimensions
const screenWidth = window.innerWidth;
const screenHeight = window.innerHeight;

const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    scale: {
        mode: Phaser.Scale.RESIZE,
        width: screenWidth,
        height: screenHeight,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        expandParent: true,
        fullscreenTarget: 'game-container'
    },
    backgroundColor: '#87CEEB',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// Responsive positioning based on screen size
const isPortrait = screenHeight > screenWidth;
const gameWidth = isPortrait ? screenWidth : screenHeight;
const gameHeight = isPortrait ? screenHeight : screenWidth;

// Scale factor
const scaleFactor = Math.min(gameWidth / 800, gameHeight / 600);

// Adjusted positions
let locations = [
    { key: 'school', text: '學校', x: gameWidth * 0.25, y: gameHeight * 0.2 },
    { key: 'classroom', text: '課室', x: gameWidth * 0.75, y: gameHeight * 0.2 },
    { key: 'toilet', text: '廁所', x: gameWidth * 0.25, y: gameHeight * 0.7 },
    { key: 'kitchen', text: '廚房', x: gameWidth * 0.75, y: gameHeight * 0.7 }
];

let character, currentTarget, trialCount = 0;
let scoreText, instructionText;
let gameStarted = false;

function preload() {
    // Load Images only
    this.load.image('bg', 'assets/bg.jpg');
    this.load.image('character', 'assets/student.png');
    locations.forEach(loc => {
        this.load.image(loc.key, `assets/${loc.key}.jpg`);
    });
}

function create() {
    const scene = this;
    
    // Background
    this.add.image(gameWidth / 2, gameHeight / 2, 'bg').setAlpha(0.3).setDisplaySize(gameWidth, gameHeight);
    
    // Create location zones with responsive sizing
    const locImageWidth = gameWidth * 0.2;
    const locImageHeight = gameHeight * 0.15;
    
    locations.forEach(loc => {
        let zone = this.add.container(loc.x, loc.y);
        let img = this.add.image(0, 0, loc.key).setDisplaySize(locImageWidth, locImageHeight);
        let txt = this.add.text(0, locImageHeight / 2 + 20, loc.text, { 
            fontSize: Math.max(16, gameWidth * 0.05) + 'px', 
            color: '#000', 
            backgroundColor: '#fff',
            padding: { x: 10, y: 5 },
            align: 'center'
        }).setOrigin(0.5);
        zone.add([img, txt]);
        zone.setData('key', loc.key);
    });

    // Character - positioned on left side
    const charStartX = gameWidth * 0.1;
    const charStartY = gameHeight * 0.45;
    const charSize = gameWidth * 0.15;
    
    character = this.add.image(charStartX, charStartY, 'character').setDisplaySize(charSize, charSize * 1.3);
    this.input.setDraggable(character);
    character.setData('startX', charStartX);
    character.setData('startY', charStartY);
    character.setDepth(10);

    // UI - Score
    scoreText = this.add.text(gameWidth * 0.02, gameHeight * 0.02, '進度: 0/10', { 
        fontSize: Math.max(18, gameWidth * 0.04) + 'px', 
        fill: '#000', 
        backgroundColor: '#fff',
        padding: { x: 10, y: 5 }
    });
    
    // UI - Instruction
    instructionText = this.add.text(gameWidth / 2, gameHeight * 0.05, '跳到: 學校', { 
        fontSize: Math.max(20, gameWidth * 0.06) + 'px', 
        fill: '#fff',
        backgroundColor: '#333',
        padding: { x: 15, y: 10 },
        align: 'center'
    }).setOrigin(0.5);

    // Drag logic
    this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
        gameObject.x = Phaser.Math.Clamp(dragX, 0, gameWidth);
        gameObject.y = Phaser.Math.Clamp(dragY, 0, gameHeight);
    });

    this.input.on('dragend', (pointer, gameObject) => {
        checkDrop(this, gameObject);
    });

    // Handle window resize
    window.addEventListener('resize', () => {
        location.reload(); // Simple reload on resize
    });

    // Start first trial
    startNewTrial(this);
    gameStarted = true;
}

function startNewTrial(scene) {
    if (trialCount >= 10) {
        showCongratulation(scene);
        return;
    }

    currentTarget = Phaser.Utils.Array.GetRandom(locations);
    instructionText.setText('跳到: ' + currentTarget.text);
    
    character.x = character.getData('startX');
    character.y = character.getData('startY');
}

function checkDrop(scene, char) {
    let matched = false;
    const dropDistance = gameWidth * 0.15; // 15% of screen width
    
    locations.forEach(loc => {
        if (loc.key === currentTarget.key) {
            let dist = Phaser.Math.Distance.Between(char.x, char.y, loc.x, loc.y);
            if (dist < dropDistance) {
                matched = true;
            }
        }
    });

    if (matched) {
        trialCount++;
        scoreText.setText(`進度: ${trialCount}/10`);
        
        // Show feedback
        let feedback = scene.add.text(gameWidth / 2, gameHeight / 2, '✓ 正確!', { 
            fontSize: Math.max(48, gameWidth * 0.12) + 'px', 
            fill: '#00ff00',
            stroke: '#000',
            strokeThickness: 4
        }).setOrigin(0.5).setDepth(100);
        
        scene.time.delayedCall(800, () => {
            feedback.destroy();
            startNewTrial(scene);
        });
    } else {
        // Show feedback
        let feedback = scene.add.text(gameWidth / 2, gameHeight / 2, '✗ 不對', { 
            fontSize: Math.max(48, gameWidth * 0.12) + 'px', 
            fill: '#ff0000',
            stroke: '#fff',
            strokeThickness: 4
        }).setOrigin(0.5).setDepth(100);
        
        scene.time.delayedCall(800, () => {
            feedback.destroy();
            // Snap back
            scene.tweens.add({
                targets: char,
                x: char.getData('startX'),
                y: char.getData('startY'),
                duration: 400,
                ease: 'Power2'
            });
        });
    }
}

function showCongratulation(scene) {
    let overlay = scene.add.rectangle(gameWidth / 2, gameHeight / 2, gameWidth, gameHeight, 0x000000, 0.8);
    scene.add.text(gameWidth / 2, gameHeight / 2, '你好棒！\n完成練習了！', { 
        fontSize: Math.max(40, gameWidth * 0.1) + 'px', 
        fill: '#fff', 
        align: 'center',
        backgroundColor: '#333',
        padding: { x: 20, y: 20 }
    }).setOrigin(0.5).setDepth(101);
    
    character.setVisible(false);
}

function update() {}
</script>
</body>
</html>
