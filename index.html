<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>廣東話詞彙小遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        #game-container {
            width: 100%;
            height: 100%;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    scale: {
        mode: Phaser.Scale.RESIZE,
        width: window.innerWidth,
        height: window.innerHeight,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    backgroundColor: '#87CEEB',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let locations = [
    { key: 'school', text: '學校', x: 200, y: 150 },
    { key: 'classroom', text: '課室', x: 600, y: 150 },
    { key: 'toilet', text: '廁所', x: 200, y: 450 },
    { key: 'kitchen', text: '廚房', x: 600, y: 450 }
];

let character, currentTarget, trialCount = 0;
let scoreText, instructionText;
let gameStarted = false;

function preload() {
    // Load Images only
    this.load.image('bg', 'assets/bg.jpg');
    this.load.image('character', 'assets/student.png');
    locations.forEach(loc => {
        this.load.image(loc.key, `assets/${loc.key}.jpg`);
    });
}

function create() {
    // Background
    this.add.image(400, 300, 'bg').setAlpha(0.3);
    
    // Create location zones
    locations.forEach(loc => {
        let zone = this.add.container(loc.x, loc.y);
        let img = this.add.image(0, 0, loc.key).setDisplaySize(150, 120);
        let txt = this.add.text(0, 70, loc.text, { 
            fontSize: '24px', 
            color: '#000', 
            backgroundColor: '#fff',
            padding: { x: 10, y: 5 }
        }).setOrigin(0.5);
        zone.add([img, txt]);
        zone.setData('key', loc.key);
    });

    // Character
    character = this.add.image(100, 300, 'character').setDisplaySize(80, 120);
    this.input.setDraggable(character);
    character.setData('startX', 100);
    character.setData('startY', 300);

    // UI
    scoreText = this.add.text(20, 20, '進度: 0/10', { 
        fontSize: '24px', 
        fill: '#000', 
        backgroundColor: '#fff',
        padding: { x: 10, y: 5 }
    });
    
    instructionText = this.add.text(400, 50, '跳到: 學校', { 
        fontSize: '28px', 
        fill: '#fff',
        backgroundColor: '#333',
        padding: { x: 15, y: 10 }
    }).setOrigin(0.5);

    // Drag logic
    this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
        gameObject.x = dragX;
        gameObject.y = dragY;
    });

    this.input.on('dragend', (pointer, gameObject) => {
        checkDrop(this, gameObject);
    });

    // Start first trial
    startNewTrial(this);
    gameStarted = true;
}

function startNewTrial(scene) {
    if (trialCount >= 10) {
        showCongratulation(scene);
        return;
    }

    currentTarget = Phaser.Utils.Array.GetRandom(locations);
    instructionText.setText('跳到: ' + currentTarget.text);
    
    character.x = character.getData('startX');
    character.y = character.getData('startY');
}

function checkDrop(scene, char) {
    let matched = false;
    
    locations.forEach(loc => {
        if (loc.key === currentTarget.key) {
            let dist = Phaser.Math.Distance.Between(char.x, char.y, loc.x, loc.y);
            if (dist < 120) {
                matched = true;
            }
        }
    });

    if (matched) {
        trialCount++;
        scoreText.setText(`進度: ${trialCount}/10`);
        
        // Show feedback
        let feedback = scene.add.text(400, 300, '✓ 正確!', { 
            fontSize: '64px', 
            fill: '#00ff00',
            stroke: '#000',
            strokeThickness: 4
        }).setOrigin(0.5);
        
        scene.time.delayedCall(800, () => {
            feedback.destroy();
            startNewTrial(scene);
        });
    } else {
        // Show feedback
        let feedback = scene.add.text(400, 300, '✗ 不對', { 
            fontSize: '64px', 
            fill: '#ff0000',
            stroke: '#fff',
            strokeThickness: 4
        }).setOrigin(0.5);
        
        scene.time.delayedCall(800, () => {
            feedback.destroy();
            // Snap back
            scene.tweens.add({
                targets: char,
                x: char.getData('startX'),
                y: char.getData('startY'),
                duration: 400,
                ease: 'Power2'
            });
        });
    }
}

function showCongratulation(scene) {
    let overlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.8);
    scene.add.text(400, 300, '你好棒！\n完成練習了！', { 
        fontSize: '56px', 
        fill: '#fff', 
        align: 'center',
        backgroundColor: '#333',
        padding: { x: 20, y: 20 }
    }).setOrigin(0.5);
    
    character.setVisible(false);
}

function update() {}
</script>
</body>
</html>
